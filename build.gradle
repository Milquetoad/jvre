// jvre — Java Vulkan Rendering Engine
//
// This build file pulls in LWJGL (Lightweight Java Game Library), which gives us
// the thin Java bindings to the native Vulkan and GLFW C libraries. LWJGL is split
// into modules; we only ask for the three we need:
//   - lwjgl        : core (memory management, the MemoryStack, shared utilities)
//   - lwjgl-glfw   : windowing + input (creates the OS window + Vulkan surface)
//   - lwjgl-vulkan : the Vulkan API bindings themselves
//
// Each native-backed module also needs a "natives" artifact for the current OS,
// which contains the actual .dll files LWJGL loads at runtime. Note that
// lwjgl-vulkan has NO natives on Windows/Linux: the Vulkan loader (vulkan-1.dll)
// is provided by the system / GPU driver, not by LWJGL.

plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

ext {
    lwjglVersion = '3.3.4'
    jomlVersion = '1.10.8'
    // We're on Windows x64. Other options exist (natives-linux, natives-macos, etc.)
    lwjglNatives = 'natives-windows'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    // The BOM (Bill of Materials) pins every lwjgl-* artifact to the same version,
    // so we don't have to repeat the version string on each line below.
    implementation platform("org.lwjgl:lwjgl-bom:$lwjglVersion")

    implementation "org.lwjgl:lwjgl"
    implementation "org.lwjgl:lwjgl-glfw"
    implementation "org.lwjgl:lwjgl-vulkan"

    // VMA (Vulkan Memory Allocator, AMD): sub-allocates many buffers/images out
    // of few big VkDeviceMemory blocks -- the real-engine memory pattern. Retires
    // jvre's one-allocation-per-resource learning scaffolding (and the
    // hand-rolled memory-type hunt: VMA picks the type from declared intent).
    // Unlike lwjgl-vulkan this IS a native library (C++), so it has natives.
    implementation "org.lwjgl:lwjgl-vma"

    // JOML (Java OpenGL Math Library): vectors + matrices, pure Java (no natives).
    // Arrives now, WITH 3D -- the hand-rolled 2D affine matrix is retired. Builds
    // the per-frame model-view-projection (perspective, translate/rotate, ...).
    implementation "org.joml:joml:$jomlVersion"

    // Native libraries (.dll) for this platform, needed only at runtime.
    runtimeOnly "org.lwjgl:lwjgl::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-glfw::$lwjglNatives"
    runtimeOnly "org.lwjgl:lwjgl-vma::$lwjglNatives"
    // (no lwjgl-vulkan natives on Windows — the loader is system-provided)
}

application {
    mainClass = 'jvre.Main'
}

// ---------------------------------------------------------------------------
// Shaders: compile GLSL -> SPIR-V at build time with glslc (ships with the
// Vulkan SDK). Vulkan consumes SPIR-V binaries, never GLSL source. Each
// src/main/glsl/*.vert|frag|comp becomes build/generated/shaders/shaders/
// <name>.spv, which rides into the jar as a classpath resource
// (/shaders/<name>.spv) -- that's where the engine loads it from.
// ---------------------------------------------------------------------------
def shaderSrcDir = layout.projectDirectory.dir('src/main/glsl')
def shaderOutDir = layout.buildDirectory.dir('generated/shaders')

tasks.register('compileShaders') {
    description = 'Compiles GLSL shaders to SPIR-V with glslc'
    inputs.dir(shaderSrcDir)
    outputs.dir(shaderOutDir)
    doLast {
        def outDir = new File(shaderOutDir.get().asFile, 'shaders')
        outDir.mkdirs()
        shaderSrcDir.asFile.eachFileMatch(~/.+\.(vert|frag|comp)$/) { src ->
            def dst = new File(outDir, src.name + '.spv')
            exec {
                // glslc infers the shader stage from the file extension.
                commandLine 'glslc', src.absolutePath, '-o', dst.absolutePath
            }
        }
    }
}

// Treat the generated .spv files as ordinary resources, built before them.
sourceSets.main.resources.srcDir(shaderOutDir)
tasks.named('processResources') { dependsOn 'compileShaders' }

// Make `gradle run` flush native crash logs etc. nicely; harmless defaults.
tasks.named('run') {
    // GLFW must own the main thread. On macOS this needs -XstartOnFirstThread;
    // on Windows nothing special is required, but we keep stdout unbuffered.
    standardInput = System.in
}
